<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Câmaras — Opus WMS</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    /* ── Página preenche 100% da altura ── */
    #main       { display:flex; flex-direction:column; height:100vh; }
    .content    { flex:1; display:flex; flex-direction:column; padding:14px 20px; min-height:0; }
    .card       { flex:1; display:flex; flex-direction:column; min-height:0; margin-bottom:0; }
    #camara-map { flex:1; min-height:0; overflow:auto; }

    /* ── Grid responsivo — células crescem/encolhem via 1fr ── */
    .camv2-grid {
      display: grid;
      gap: 3px;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
    }

    /* Cabeçalho de rua (linha superior) */
    .camv2-col-header {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 3px;
      font-size: .63rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .04em;
    }

    /* Label lateral (C0, P01 …) */
    .camv2-row-label {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      padding-right: 6px;
      font-size: .63rem;
      font-weight: 600;
      color: var(--muted);
      white-space: nowrap;
    }
    /* Label do corredor */
    .camv2-cor-label { color: var(--muted); }
    .camv2-cor-sub   { font-size: .55rem; opacity: .75; }

    /* ── Célula base ── */
    .pcv2 {
      border-radius: 5px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      padding: 2px 1px;
      min-width: 0;
      min-height: 0;
      cursor: default;
      transition: border-color .12s, box-shadow .12s;
      container-type: size;
    }
    .pcv2:not(.gap):not(.placeholder):hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
      z-index: 2;
      position: relative;
    }

    /* Posições normais */
    .pcv2.livre    { background:rgba(34,197,94,.08);  border-color:rgba(34,197,94,.22); }
    .pcv2.ocupada  { background:rgba(99,102,241,.13); border-color:rgba(99,102,241,.4); }
    .pcv2.reservada{ background:rgba(245,158,11,.12); border-color:rgba(245,158,11,.4); }

    /* Corredor — mesma paleta das ruas */
    .pcv2.corredor.livre    { background:rgba(34,197,94,.08);  border-color:rgba(34,197,94,.22); }
    .pcv2.corredor.ocupada  { background:rgba(99,102,241,.13); border-color:rgba(99,102,241,.4); }
    .pcv2.corredor.reservada{ background:rgba(245,158,11,.12); border-color:rgba(245,158,11,.4); }

    /* Gap / porta */
    .pcv2.gap         { background:transparent; border-color:transparent; opacity:.12; }
    .pcv2.placeholder { background:transparent; border-color:transparent; pointer-events:none; }

    /* ── Textos internos — escalam com a célula via cqmin ── */
    .pcv2-id {
      font-size: clamp(.44rem, 2.2cqmin, .82rem);
      font-weight: 700;
      color: var(--text);
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 94%;
    }
    .pcv2-var {
      font-size: clamp(.38rem, 1.8cqmin, .68rem);
      color: var(--muted);
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 94%;
    }
    .pcv2-cls {
      font-size: clamp(.34rem, 1.5cqmin, .58rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .03em;
      color: var(--accent);
      opacity: .85;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 94%;
    }
    /* Número da rua nas células livres do corredor */
    .pcv2-rua-num {
      font-size: clamp(.46rem, 2.4cqmin, .88rem);
      font-weight: 700;
      color: var(--warning);
      opacity: .8;
    }

    /* ── Drag and Drop ── */
    .pcv2[draggable="true"] { cursor: grab; }
    .pcv2[draggable="true"]:active { cursor: grabbing; }
    .pcv2.dragging {
      opacity: .3;
      transform: scale(.92);
      box-shadow: none !important;
      border-style: dashed !important;
    }
    .pcv2.drag-over-valid {
      border-color: #22c55e !important;
      border-width: 2px !important;
      box-shadow: 0 0 0 3px rgba(34,197,94,.35) !important;
      background: rgba(34,197,94,.22) !important;
      z-index: 3;
      position: relative;
    }
    .pcv2.drag-over-blocked {
      border-color: rgba(239,68,68,.65) !important;
      box-shadow: 0 0 0 2px rgba(239,68,68,.22) !important;
      background: rgba(239,68,68,.1) !important;
      cursor: not-allowed;
    }
    /* Ghost flutuante para touch drag */
    .dnd-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 9998;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: .78rem;
      font-weight: 700;
      background: var(--accent);
      color: #fff;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
      transform: translate(-50%, -160%);
      white-space: nowrap;
    }

    /* ── Abas ── */
    .btn-camara-tab {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 7px;
      padding: 6px 16px;
      font-size: .8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-camara-tab:hover  { color:var(--text); background:var(--surface2); }
    .btn-camara-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  </style>
</head>
<body>

  <div class="content">

    <div class="toolbar" style="margin-bottom:12px">
      <button class="btn-camara-tab active" data-cam="01" onclick="renderCamara('01')">Câmara 01</button>
      <button class="btn-camara-tab"        data-cam="02" onclick="renderCamara('02')">Câmara 02</button>

      <div style="margin-left:auto;display:flex;align-items:center;gap:14px;font-size:.8rem;color:var(--muted)">
        <span style="display:flex;align-items:center;gap:5px">
          <i style="width:12px;height:12px;border-radius:3px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);display:inline-block"></i>Livre
        </span>
        <span style="display:flex;align-items:center;gap:5px">

        </span>
        <span style="display:flex;align-items:center;gap:5px">
          <i style="width:12px;height:12px;border-radius:3px;background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.4);display:inline-block"></i>Reservada
        </span>
        <span style="display:flex;align-items:center;gap:5px">
          <i style="width:12px;height:12px;border-radius:3px;background:transparent;border:1px solid var(--border);opacity:.3;display:inline-block"></i>Porta
        </span>

    <div class="card">
      <div class="card-title" id="camara-titulo">Câmara 01</div>
      <div id="camara-map">Carregando…</div>
